name: Build and Test

on:
    pull_request:
        branches: [ "main" ]

jobs:
    test:
        name: Run Unit & E2E Tests
        runs-on: ubuntu-latest

        steps:
            -   name: Check out the repo
                uses: actions/checkout@v4

            -   name: Run Srv Test
                working-directory: srv
                run: |
                    npm ci
                    npm run release

            -   name: Run UI Test
                working-directory: ui
                run: |
                    npm ci
                    npm run build
                    npm run test -- --watch=false --browsers=ChromeHeadless
                    npm run e2e:test

    build-docker:
        name: Build Docker Image
        runs-on: ubuntu-latest

        steps:
            -   name: Check out the repo
                uses: actions/checkout@v4

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Build standalone Docker image
                uses: docker/build-push-action@v5
                with:
                    context: .
                    file: standalone.dockerfile
                    push: false
                    cache-from: type=gha
                    cache-to: type=gha,mode=max

    postgres-tests:
        name: PostgreSQL Backend Test Suite
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16-alpine
                env:
                    POSTGRES_USER: root
                    POSTGRES_PASSWORD: root
                    POSTGRES_DB: auth_server_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd "pg_isready -U root -d auth_server_test"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            -   name: Check out the repo
                uses: actions/checkout@v4

            -   name: Run backend test suite against PostgreSQL
                working-directory: srv
                env:
                    DATABASE_TYPE: postgres
                    DATABASE_HOST: 127.0.0.1
                    DATABASE_PORT: 5432
                    DATABASE_NAME: auth_server_test
                    DATABASE_USERNAME: root
                    DATABASE_PASSWORD: root
                    DATABASE_SSL: "false"
                run: |
                    npm ci
                    npm test
