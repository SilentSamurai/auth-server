services:
    auth_ui:
        build: ./ui
        container_name: auth_ui
        environment:
            PORT: 80
            AUTH_SERVER: http://auth_srv:8080/api
        ports:
            - "9001:80"
        depends_on:
            - auth_srv

    auth_srv:
        build: ./srv
        container_name: auth_srv
        environment:
            ENV: development
            PORT: 8080
            DATABASE_TYPE: postgres
            DATABASE_HOST: db
            DATABASE_PORT: 5432
            DATABASE_NAME: myidentity_db
            DATABASE_USERNAME: root
            DATABASE_PASSWORD: root
            DATABASE_SSL: false
            MAIL_HOST: smtp
            MAIL_PORT: 578
        depends_on:
            - db
            - smtp

    smtp:
        image: node:20.19.0-alpine
        working_dir: /app
        volumes:
            - ./srv/package.json:/app/package.json
            - ./srv/src/mail/FakeSmtpServer.ts:/app/src/mail/FakeSmtpServer.ts
        command: >
            sh -c "npm i &&
                   npm run smtp-server"

    db:
        container_name: myidentity_db
        image: postgres
        restart: always
        volumes:
            - myidentity_db_volume:/var/lib/postgresql/data
        #        ports:
        #            - 5420:5432
        environment:
            POSTGRES_USER: root
            POSTGRES_DB: myidentity_db
            POSTGRES_PASSWORD: root

    #    pgadmin:
    #        image: dpage/pgadmin4
    #        container_name: pgadmin4_container
    #        restart: always
    #        ports:
    #            - "8888:80"
    #        environment:
    #            PGADMIN_DEFAULT_EMAIL: postgres@mail.com
    #            PGADMIN_DEFAULT_PASSWORD: password@1234

    standalone:
        build:
            dockerfile: standalone.dockerfile
        # The image boots systemd as PID 1, which needs a writable cgroup mount
        # and privileged mode under Docker. (In prod this runs as a Proxmox LXC
        # where systemd is native and none of this is required.)
        privileged: true
        cgroup: host
        stop_signal: SIGRTMIN+3
        # Allocate a console so systemd's boot output and service stderr
        # (StandardError=journal+console) are captured by `docker logs`. The
        # Proxmox LXC already provides this via `pct console`, so it's local-only.
        tty: true
        environment:
            ENV: production
            PORT: 4200            # nginx listen port
            BACKEND_PORT: 9001    # backend listen port
            # Local-only test secrets; the backend refuses to boot in production
            # without these (.env.production defaults to a self-contained sqlite DB).
            COOKIE_SECRET: "local-dev-not-a-real-secret"
            SUPER_ADMIN_PASSWORD: "local-dev-not-a-real-password"
            # Point at your Loki to test log shipping end-to-end:
            LOKI_URL: "http://192.168.0.167:3100"
        volumes:
            - ./ui/nginx/templates:/etc/nginx/templates
            - /sys/fs/cgroup:/sys/fs/cgroup:rw
        tmpfs:
            - /run
            - /run/lock
        ports:
            - 4200:4200


volumes:
    myidentity_db_volume: