# Drop-in for the packaged alloy.service.
# Makes LOKI_URL (and optional basic-auth) from the container environment
# available to Alloy's sys.env(...) lookups, and orders it after the env export.
[Unit]
Requires=container-env.service
After=container-env.service
# Only run Alloy if a Loki endpoint was configured. container-env.service writes
# LOKI_* into /run/loki.env; if none were set the file is empty and Alloy is
# skipped cleanly (no invalid-URL errors / restart loop), logs still in journald.
# NB: ConditionEnvironment= is NOT usable here — systemd as PID 1 does not import
# the container's env into its manager environment block, so it never sees LOKI_URL.
ConditionFileNotEmpty=/run/loki.env

[Service]
EnvironmentFile=-/run/loki.env
