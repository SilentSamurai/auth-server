# Main nginx config for the standalone (Debian) image.
# Logs go to stdout/stderr so that, running under systemd, they are captured by
# journald and shipped to Loki by Grafana Alloy. Access logs are emitted as JSON
# (app="nginx") so they parse cleanly alongside the backend's JSON logs.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

# nginx error log -> journald. Use the special `stderr` keyword (writes the
# already-open fd 2), NOT /dev/stderr: under systemd the service's stderr is a
# journal socket, and nginx re-opens log paths by name — open()ing a socket
# fails with ENXIO. `stderr` writes the inherited fd directly.
error_log stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Structured access log. escape=json keeps values safe when they contain
    # quotes/backslashes. One JSON object per request, newline-delimited.
    log_format json_combined escape=json
        '{'
            '"@timestamp":"$time_iso8601",'
            '"app":"nginx",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"referer":"$http_referer",'
            '"user_agent":"$http_user_agent",'
            '"x_forwarded_for":"$http_x_forwarded_for"'
        '}';

    # nginx access log -> journald via its syslog socket (/dev/log). Same reason
    # as error_log above: access_log has no "stderr" keyword and /dev/stdout would
    # hit the socket-reopen problem. journald attributes these to nginx.service
    # (by the sender's cgroup), so the `unit` label still works in Loki.
    access_log syslog:server=unix:/dev/log,tag=nginx,severity=info,nohostname json_combined;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    # The server{} block and http-context rate-limit zones are rendered from
    # ui/nginx/templates/default.conf.template into here at boot.
    include /etc/nginx/conf.d/*.conf;
}
